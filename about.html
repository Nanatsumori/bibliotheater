<main><section class="section"><h1 class="section-title">ビブリオ劇場とは</h1><p class="large-text">図書館、書店、まちライブラリーなど、本のある場所を舞台に、本に関係する劇を上演する取り組みです。</p><p>劇を通して、人と本、人と人がつながり、新しい出会いが生まれます。観客は本の世界に触れ、演じる中学生は本を読み、考え、身体を使って物語を届けます。</p><p>ビブリオ劇場は、単なる上演ではなく、本のある空間そのものを生かした活動です。書架、階段、閲覧席、通路など、日常の場所がそのまま物語の舞台になります。</p></section></main>
